        padding: 8px;
        text-decoration: none;
        font-size: 26px;
        color: #818181;
        display: block;
        transition: 0.3s;
      }

      .overlay2 a:hover, .overlay2 a:focus {
        color: #f1f1f1;
      }

      .overlay2 .closebtn {
        position: absolute;
        top: 20px;
        right: 45px;
        font-size: 60px;
      }

      @media screen and (max-height: 450px) {
        .overlay2 a {font-size: 20px}
        .overlay2 .closebtn {

          top: 15px;
          right: 35px;
